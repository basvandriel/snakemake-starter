services:
  # ── deployed / CI ────────────────────────────────────────────────────────────
  pipeline:
    build: .
    volumes:
      - ./resources:/pipeline/resources:ro
      - ./results:/pipeline/results

  dev:
    build: .
    volumes:
      - ./data:/pipeline/data:ro
      - ./results:/pipeline/results
      - ./Snakefile:/pipeline/Snakefile:ro   # live-reload rules without rebuild
    command: ["--cores", "4", "--rerun-incomplete"]
    profiles: ["dev"]

  # ── Apptainer local testing (macOS-safe via privileged Docker) ───────────────
  # Requires the image to be saved first: make docker-save
  #
  # Build step: converts the local .tar to a .sif and writes it back to ./
  apptainer-build:
    image: ghcr.io/apptainer/apptainer:latest
    privileged: true
    volumes:
      - .:/workspace          # .sif is written here, back to your project dir
    working_dir: /workspace
    command: apptainer build --force snakemake-starter-pipeline.sif docker-archive:snakemake-starter-pipeline.tar
    profiles: ["apptainer"]

  # Run step: executes the pipeline using the .sif built above
  apptainer-run:
    image: ghcr.io/apptainer/apptainer:latest
    privileged: true
    volumes:
      # Mount at neutral paths so Apptainer's squashfs overlay of /pipeline
      # doesn't shadow them. Apptainer --bind then maps them into the right
      # locations inside the .sif.
      - ./data:/mnt/data:ro
      - ./results:/mnt/results
      - ./.snakemake:/mnt/snakemake
      - ./snakemake-starter-pipeline.sif:/pipeline.sif:ro
    command: >-
      apptainer run
      --pwd /pipeline
      --bind /mnt/data:/pipeline/data
      --bind /mnt/results:/pipeline/results
      --bind /mnt/snakemake:/pipeline/.snakemake
      /pipeline.sif
    profiles: ["apptainer"]
