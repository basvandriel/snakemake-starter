name: CI/CD

on:
  push:
    branches: [main, feature/*]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: workflow:latest
          load: true